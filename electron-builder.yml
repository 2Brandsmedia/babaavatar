appId: com.2brandsmedia.babaavatar
productName: BabaAvatar
copyright: Copyright © 2026 2Brands Media GmbH

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - resources/**/*
  - package.json

asar: true

asarUnpack:
  - node_modules/electron-updater/**/*

mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.png
  hardenedRuntime: false
  gatekeeperAssess: false
  extendInfo:
    NSCameraUsageDescription: 'BabaAvatar braucht Zugriff auf die Kamera für das Gesichts-Tracking.'
    NSMicrophoneUsageDescription: 'BabaAvatar braucht Zugriff auf das Mikrofon für Lipsync.'

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
  artifactName: 'BabaAvatar-Setup-${version}.${ext}'

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  menuCategory: false
  shortcutName: BabaAvatar
  uninstallDisplayName: 'BabaAvatar - VTuber Tracking'
  deleteAppDataOnUninstall: true
  runAfterFinish: true
  differentialPackage: true
  installerIcon: resources/installer.ico
  uninstallerIcon: resources/installer.ico
  installerHeader: resources/installer-header.bmp
  installerSidebar: resources/installer-sidebar.bmp
  uninstallerSidebar: resources/installer-sidebar.bmp
  installerHeaderIcon: resources/installer.ico
  include: resources/installer.nsh
  installerLanguages:
    - de_DE
    - en_US
  displayLanguageSelector: false

publish:
  provider: github
  owner: 2Brandsmedia
  repo: babaavatar
  releaseType: release
